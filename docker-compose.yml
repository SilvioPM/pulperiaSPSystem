services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: spsystem
      POSTGRES_USER: spsystem
      POSTGRES_PASSWORD: spsystem123
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spsystem"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://spsystem:spsystem123@db:5432/spsystem
      JWT_SECRET: ${JWT_SECRET:-686bdbca4b9522bbf637ff0ae8bdaa784e24cf965ea55592e8a28f6e596c88f3}
      APP_LICENSE_SECRET: ${APP_LICENSE_SECRET:-spsystem-2024-secret-key-produccion}
      NODE_ENV: production
      SPSYSTEM_DATA_DIR: /app/data
      SPSYSTEM_BACKUP_DIR: /app/respaldos
    volumes:
      - appdata:/app/data
      - C:\respaldos-spsystem:/app/respaldos
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  pgdata:
  appdata:
